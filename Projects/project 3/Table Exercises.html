<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="author" content="Yisma">
    <title>Complex table</title>
  </head>
<body>
  <table border="1">
    <tr>
      <td>Quick</td>
      <td colspan="2">Brown fox</td>
      <td>jumps</td>
    </tr>
    <tr>
      <td rowspan="3">Over the</td>
      <td>lazy</td>
      <td>dog</td>
      <td>and</td>
    </tr>
    <tr>
      <td>then</td>
      <td>it</td>
      <td>fall</td>
    </tr>
    <tr>
      <td colspan="3">prey to a loin</td>
    </tr>
  </table>
</body>
</html>
