<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booleans</title>
</head>
<body>
  <script>
  true
  false

  console.log(3<5);
  console.log(5 == '5'); // defend only the value , it changed to the same type
  console.log(5 === '5'); // check both value and data types

  if(true){
    console.log('hello');
  } else {
    console.log('else');
  }

  const age = 30;
  if(age >= 16){
    console.log('You can drive');
  } else if(age <= 16) {
    console.log('You can not drive');
  } else {
        console.log('You can out of the two');

  }

  // logical operators
  console.log(true && false);
  console.log(0.2 >= 0 && 0.2 <= 1/3);
  console.log(true || false);
  console.log(!true);
     
   // shortcut for if else statement

          // Turnery Operator
  const result = true? 'truthy' : 'falsy';
  console.log(result);

          // Guard Operator 
  false && console.log('hello');
  const message = false && 'hello';
  console.log(message);

          // Default Operator
  const currency ='EUR' || 'USD';
  console.log(currency);
  
  // Truthy(All other than falsy values) and Falsy(false , 0, '' , NaN, undefined , null) Values

  if (0){
    console.log('truthy');
  }

  const cartQuantity = 5;

  if (cartQuantity) {
    console.log('cart has products');
  }
  console.log(!0); // true
  console.log('text'/5); // Not a Number(NaN)

  let variable1; // const variable1 = undefined
  console.log(variable1); //undefined(the variable dosn't have value)
  </script>
</body>
</html>
